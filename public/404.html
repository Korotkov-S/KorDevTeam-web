<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 - Страница не найдена | KorDevTeam</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070a12;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --border: rgba(148, 163, 184, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, rgba(34, 211, 238, 0.14), transparent 34rem), var(--bg);
        color: var(--fg);
      }

      main {
        width: min(100%, 560px);
        padding: 40px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.72);
      }

      p:first-child {
        margin: 0 0 16px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 7vw, 56px);
        line-height: 1;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border-radius: 6px;
        background: var(--accent);
        color: #031018;
        font-weight: 700;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid rgba(34, 211, 238, 0.45);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <p>404</p>
      <h1>Страница не найдена</h1>
      <p>Адрес устарел, был удален или набран с ошибкой.</p>
      <a href="/">На главную</a>
    </main>
  </body>
</html>
